#!name=YouTube (Music) Enhance - Quantumult X
#!desc=YouTube / YouTube Music：去广告、后台播放、画中画（基于 Maasea/sgmodule，QX 兼容版）
#!author=25175; based on Maasea/sgmodule
#!homepage=https://github.com/25175/quantumultx-youtube-music-enhance
#!icon=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/YouTube.png

# 注意：这是 Quantumult X 原生格式，不要以 Surge Module 导入。
# 仅保留这一份 YouTube 响应体重写，避免与其他 YouTube 重写重复匹配。
# 若要保留歌曲封面/锁屏媒体信息，建议先只启用本文件并测试；不要叠加 DualSubs 或其他 YouTube response-body 脚本。

[rewrite_local]

# Googlevideo 广告流：去掉低质量广告层级参数
(^https?:\\/\\/[\\w-]+\\.googlevideo\\.com\\/(?!dclk_video_ads).+?)&ctier=L(&.+?),ctier,(.+) url 302 $1$2$3
^https?:\\/\\/[\\w-]+\\.googlevideo\\.com\\/(?!(dclk_video_ads|videoplayback\\?)).+&oad url reject-200

# YouTube / YouTube Music 广告统计请求
^https?:\\/\\/(www|s)\\.youtube\\.com\\/api\\/stats\\/ads url reject-200
^https?:\\/\\/(www|s)\\.youtube\\.com\\/(pagead|ptracking) url reject-200
^https?:\\/\\/s\\.youtube\\.com\\/api\\/stats\\/qoe\\?adcontext url reject-200

# 播放器、首页、搜索、队列等响应：启用后台播放/PiP并移除广告内容
^https?:\\/\\/youtubei\\.googleapis\\.com\\/youtubei\\/v1\\/(browse|next|player|search|reel\\/reel_watch_sequence|guide|account\\/get_setting|get_watch|log_event|config)(\\?.*)? url script-response-body https://raw.githubusercontent.com/25175/quantumultx-youtube-music-enhance/main/youtube.response.js

# initplayback / log_event 请求处理：与上游脚本的 QX 适配器配合
^https?:\\/\\/[\\w-]+\\.googlevideo\\.com\\/initplayback.+&ack.* url script-request-body https://raw.githubusercontent.com/25175/quantumultx-youtube-music-enhance/main/youtube.request.js
^https?:\\/\\/youtubei\\.googleapis\\.com\\/youtubei\\/v1\\/log_event(\\?.*)? url script-request-body https://raw.githubusercontent.com/25175/quantumultx-youtube-music-enhance/main/youtube.request.js

[mitm]
hostname = youtubei.googleapis.com, *.googlevideo.com, www.youtube.com, s.youtube.com, music.youtube.com

# QX 版本较旧或不需要请求体处理时，可只保留 response 规则和上面的广告规则。
# 若启用后出现播放失败，先删除本文件，确认官方播放，再逐项排查 MITM/规则冲突。
